version: 0.2

phases:
  pre_build:
    commands:
      - echo "Invisirisk startup script..."
      -  # invisirisk startup script
      - curl $API_URL/pse/bitbucket-setup/pse_startup | bash
      - . /etc/profile.d/pse-proxy.sh
      

  build:
    commands:
      - echo "Docker build with proxy settings..."
      - echo "http_proxy=$PROXY_IP, https_proxy=$PSE_PROXY_IP"
      - env
      - docker login -u ashrayat9 -p $password
      - docker build -t ruby --build-arg BUILDKIT_SYNTAX=kkisalaya/pse-frontend:latest --secret id=pse-ca,src=/etc/ssl/certs/pse.pem  --build-arg ir_proxy=http://${PROXY_IP}:3128 .

  post_build:
    commands:
      - echo "Build complete!"
      - gem list
      - bash /tmp/pse_cleanup/cleanup.sh
